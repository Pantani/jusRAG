# Golden dataset — Direito Penal (CP, Decreto-Lei 2.848/1940; CPP, Decreto-Lei 3.689/1941).
#
# Phase E multi-area golden (§24, §35-37). Anchored on REAL articles in the ingested
# corpus (data/generated/statutes_chunks.jsonl) — no invented article (rule #1).
# Lexically calibrated for recall@5 >= 0.80 under the deterministic FakeEmbeddingProvider.
# chunk_id scheme: cp-2848-1940-art-N / cpp-3689-1941-art-N.

- id: criminal-cp-art121-homicidio
  area: criminal
  question: Homicídio matar alguém crime impelido por motivo de relevante valor social ou moral sob domínio de violenta emoção pena de reclusão?
  expected_chunk_ids: [cp-2848-1940-art-121]
  expected_behavior: answered
  expected_articles: ["121"]

- id: criminal-cp-art155-furto
  area: criminal
  question: Furto subtrair para si ou para outrem coisa alheia móvel pena de reclusão?
  expected_chunk_ids: [cp-2848-1940-art-155]
  expected_behavior: answered
  expected_articles: ["155"]

- id: criminal-cp-art157-roubo
  area: criminal
  question: Roubo subtrair coisa móvel alheia para si ou para outrem mediante grave ameaça ou violência a pessoa?
  expected_chunk_ids: [cp-2848-1940-art-157]
  expected_behavior: answered
  expected_articles: ["157"]

- id: criminal-cp-art171-estelionato
  area: criminal
  question: Estelionato obter para si ou para outrem vantagem ilícita em prejuízo alheio induzindo ou mantendo alguém em erro mediante artifício ardil?
  expected_chunk_ids: [cp-2848-1940-art-171]
  expected_behavior: answered
  expected_articles: ["171"]

- id: criminal-cp-art14-crime-consumado-tentado
  area: criminal
  question: Diz-se o crime consumado quando nele se reúnem todos os elementos de sua definição legal e tentado quando iniciada a execução não se consuma?
  expected_chunk_ids: [cp-2848-1940-art-14]
  expected_behavior: answered
  expected_articles: ["14"]

- id: criminal-cp-art26-inimputabilidade
  area: criminal
  question: É isento de pena o agente que por doença mental era ao tempo da ação inteiramente incapaz de entender o caráter ilícito do fato?
  expected_chunk_ids: [cp-2848-1940-art-26]
  expected_behavior: answered
  expected_articles: ["26"]

- id: criminal-cp-art1-legalidade
  area: criminal
  question: Não há crime sem lei anterior que o defina nem pena sem prévia cominação legal princípio da legalidade penal?
  expected_chunk_ids: [cp-2848-1940-art-1]
  expected_behavior: answered
  expected_articles: ["1º"]

- id: criminal-cp-art44-penas-restritivas
  area: criminal
  question: As penas restritivas de direitos são autônomas e substituem as privativas de liberdade quando preenchidos os requisitos?
  expected_chunk_ids: [cp-2848-1940-art-44]
  expected_behavior: answered
  expected_articles: ["44"]

- id: criminal-cpp-art5-inquerito
  area: criminal
  question: Nos crimes de ação pública o inquérito policial será iniciado de ofício ou mediante requisição da autoridade judiciária ou do Ministério Público?
  expected_chunk_ids: [cpp-3689-1941-art-5]
  expected_behavior: answered
  expected_articles: ["5º"]

- id: criminal-cpp-art312-prisao-preventiva
  area: criminal
  question: A prisão preventiva poderá ser decretada como garantia da ordem pública da ordem econômica por conveniência da instrução criminal?
  expected_chunk_ids: [cpp-3689-1941-art-312]
  expected_behavior: answered
  expected_articles: ["312"]

# Migrated from consumer_golden.yaml oos-* in Phase 14 (recurate): the CP is in-scope
# corpus, so these are answerable, not refusals. Ids preserved; reworded to anchor on
# the real article text validated top-5 on the offline harness (system rule #1).
- id: oos-crime-latrocinio
  area: criminal
  question: O roubo se da violência resultar morte latrocínio constitui crime subtrair coisa móvel alheia mediante grave ameaça ou violência a pessoa com pena de reclusão?
  expected_chunk_ids: [cp-2848-1940-art-157]
  expected_behavior: answered
  expected_articles: ["157"]

- id: oos-pen-01
  area: criminal
  # Feminicídio is the autonomous crime of CP art. 121-A (Lei 14.994/2024: "Matar
  # mulher por razões da condição do sexo feminino"), not a qualifier of art. 121 —
  # anchor verified against the real corpus text (system rule #1).
  question: Matar mulher por razões da condição do sexo feminino feminicídio tem pena de reclusão?
  expected_chunk_ids: [cp-2848-1940-art-121-a]
  expected_behavior: answered
  expected_articles: ["121-A"]
