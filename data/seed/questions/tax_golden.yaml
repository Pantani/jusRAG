# Golden dataset — Direito Tributário (CTN, Lei 5.172/1966).
#
# Phase E multi-area golden (§24, §35-37). Anchored on REAL CTN articles in the
# ingested corpus (data/generated/statutes_chunks.jsonl) — no invented article (rule #1).
# Lexically calibrated for recall@5 >= 0.80 under the deterministic FakeEmbeddingProvider.
# chunk_id scheme: ctn-5172-1966-art-N.

- id: tax-ctn-art3-conceito-tributo
  area: tax
  question: Tributo é toda prestação pecuniária compulsória em moeda que não constitua sanção de ato ilícito instituída em lei?
  expected_chunk_ids: [ctn-5172-1966-art-3]
  expected_behavior: answered
  expected_articles: ["3º"]

