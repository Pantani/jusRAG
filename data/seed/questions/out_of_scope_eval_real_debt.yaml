# Out-of-scope — eval-real debt cohort (NOT loaded by the fake CI gate).
#
# IMPORTANT: this file is deliberately NOT named "*_golden.yaml", so
# packages.evals.golden.load_golden() does NOT pick it up. It is documentation of a
# KNOWN eval-real debt, kept under version control so the cases are not lost.
#
# SCOPE OF THIS DEBT (Phase-14 explicit-OOS-signal restore — see
# _workspace/14_eval_oos_restore_summary.md):
# After the answer wired the deterministic `matched_out_of_scope_regime` signal
# (_workspace/14_answer_oos_signal_consume_summary.md), every question that MATCHES a
# corpusless regime term pre-refuses DETERMINISTICALLY (fake AND real), independent of the
# embedding. Those were RESTORED to out_of_scope_golden.yaml. This file now holds ONLY the
# genuinely grounding-dependent residue: questions that match NO regime term, reach
# retrieval, and refuse correctly ONLY under real dense embeddings (large semantic distance
# to an absent regime), while leaking under the purely-lexical FakeEmbeddingProvider.
# Each is verified `matched_out_of_scope_regime(question) is False`.
#
# Two sub-classes remain:
#
# Cohort A — TAX sub-topics routed to the in-scope `tax` area (or UNKNOWN) sharing the
# surface vocabulary "imposto"/"ICMS"/"IRPF"/"ITCMD" but whose specific regime is NOT in
# the CTN corpus (CTN is the general norm: no aliquots, no state taxes). The fake lexical
# store scores tangential CTN chunks above the grounding threshold (_MIN_SEMANTIC_SCORE
# 0.29; e.g. ICMS -> CTN art. 69 at 0.583) and the writer answers instead of refusing.
#
# Cohort B — corpusless REGIMES whose specific surface vocabulary is NOT (yet) a term in
# the agentic `_OUT_OF_SCOPE_TERMS` set: eleitoral/inelegibilidade, migração/visto,
# família/sucessões substantivas (pensão/herdeiros/testamento), concorrência/CADE, direitos
# autorais, M&A, tese penal STF, registro civil. They classify UNKNOWN with NO regime match,
# so they proceed to retrieval and refuse only on dense grounding distance.
#
# Validated as fake artifacts (status flips fake->answered, real->refused), NOT regressions:
# the product behaviour under real providers is the correct refusal.
#
# Pendência ao orquestrador:
#   - agentic: broaden `_OUT_OF_SCOPE_TERMS` to cover Cohort B regimes (eleitoral, migração,
#     concorrência, autoral, sucessões substantivas) so they pre-refuse deterministically and
#     can return to out_of_scope_golden.yaml; and/or route corpusless sub-topics of an
#     in-scope area (Cohort A tax) to OOS.
#   - retrieval/answer: tighten the grounding signal so an UNKNOWN question with no
#     semantically-close source refuses rather than grounding on a tangential chunk.

