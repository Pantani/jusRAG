# --- Out-of-scope: direito tributário (refusal) ---
# These taxes (IR, ITCMD, ICMS) are genuinely OUT of scope — they are NOT in the CTN
# corpus (ICMS/ITCMD are state taxes; IR is its own law). oos-tax-01..04 and
# oos-declarar-bitcoin MOVED to out_of_scope_eval_real_debt.yaml: the agentic classifier
# routes them to `tax` (shared vocabulary) and the fake lexical embedding then scores
# tangential CTN chunks (e.g. art. 69 "base de cálculo do imposto" at 0.583) above the
# grounding threshold, so the deterministic CI pipeline cannot refuse them. They refuse
# under real embeddings (real semantic distance to ICMS/IR is large). Tracked as
# eval-real debt; oos-tax-05 stays because its phrasing routes to `unknown` (OOS area)
# and refuses cleanly under the fake pipeline too. oos-imposto-territorial (ITR) likewise
# oos-tax-05 (IRPF) MOVED to out_of_scope_eval_real_debt.yaml (Phase-14 final
# consolidation): after the answer fix stopped pre-refusing UNKNOWN it now grounds on a
# tangential CLT/CC chunk under the fake lexical embedding. Refuses under real embeddings.
# Tracked as eval-real debt. Id preserved.

# --- Out-of-scope: direito penal (refusal) ---
# oos-pen-01 (feminicídio) MIGRATED to criminal_golden.yaml — CP art. 121 is in corpus.
# oos-pen-02 (tráfico privilegiado, tese STF) MOVED to out_of_scope_eval_real_debt.yaml
# (Phase-14 final consolidation): classifies UNKNOWN and leaks under the fake lexical
# embedding after the answer fix. Refuses under real embeddings. Id preserved.
