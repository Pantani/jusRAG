# Golden dataset — Direito do Consumidor (CDC, Lei 8.078/1990) + STJ súmulas.
#
# Source of truth for Phase-8 evals (§24, §35–37). Each item:
#   id                 stable identifier (never renumber; extend only by appending)
#   question           the user query (calibrated for lexical overlap so the
#                      deterministic FakeEmbeddingProvider recovers the right chunk
#                      in the top-5 — recall@5 ≥ 0.80, §36)
#   expected_chunk_ids chunk_ids from the seed that MUST be retrieved (recall/precision@5)
#   expected_behavior  answered | refused
#   expected_articles  (optional) CDC article numbers the answer should rest on
#   expected_sumulas   (optional) STJ súmula numbers the answer should rest on
#
# Out-of-scope items (tax, criminal, civil, labor, social-security) carry
# expected_behavior=refused and no expected_chunk_ids — they measure
# refusal_when_no_source_rate (§36). Faithful to the seed: no invented
# article/súmula. The corpus seeds CDC arts. 6º, 12, 14, 18, 26, 49 and STJ
# súmulas 130, 297, 302, 479, 543.

