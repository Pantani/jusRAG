# substantive usucapião arts. CC 1.238+ are NOT cleanly in the corpus — the chunk ids
# are corrupted by the chunker, "1.241" -> art-1-occ-245), but the fake lexical
# embedding scores tangential civil chunks above grounding so it cannot be refused
# under the deterministic CI pipeline. Excluded from the fake gate; refuses under
# real embeddings. Tracked as eval-real debt.

# oos-aposentadoria-inss MOVED to out_of_scope_eval_real_debt.yaml (Phase-14 final
# consolidation): classifies UNKNOWN (corpusless previdenciário) and leaks under the fake
# lexical embedding after the answer fix stopped pre-refusing UNKNOWN. Refuses under real
# embeddings. Tracked as eval-real debt (cohort B). Id preserved.

# oos-declarar-bitcoin MOVED to out_of_scope_eval_real_debt.yaml (fake-embedding leak;
# crypto/IR is genuinely OOS — not in the CTN — but routes to tax + scores tangential
# CTN chunks under the fake lexical embedding). Tracked as eval-real debt.

