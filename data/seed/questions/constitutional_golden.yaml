  expected_chunk_ids: [cf88-1988-1988-art-6]
  expected_behavior: answered
  expected_articles: ["6º"]

- id: const-cf-art7-direitos-trabalhadores
  area: constitutional
  question: São direitos dos trabalhadores urbanos e rurais a relação de emprego protegida contra despedida arbitrária e o fundo de garantia?
  expected_chunk_ids: [cf88-1988-1988-art-7]
  expected_behavior: answered
  expected_articles: ["7º"]

- id: const-cf-art37-administracao-publica
  area: constitutional
  question: A administração pública direta e indireta obedecerá aos princípios de legalidade impessoalidade moralidade publicidade e eficiência?
