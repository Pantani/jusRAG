# Golden dataset — Direito Constitucional (CF/88, Constituição da República de 1988).
#
# Phase E multi-area golden (§24, §35-37). Anchored on REAL CF/88 articles in the
# ingested corpus (data/generated/statutes_chunks.jsonl) — no invented article (rule #1).
# Lexically calibrated for recall@5 >= 0.80 under the deterministic FakeEmbeddingProvider.
# chunk_id scheme: cf88-1988-1988-art-N (corpus uses norm_number=1988, norm_year=1988).

- id: const-cf-art1-estado-democratico
  area: constitutional
  question: A República Federativa do Brasil formada pela união indissolúvel dos Estados e Municípios constitui-se em Estado Democrático de Direito?
  expected_chunk_ids: [cf88-1988-1988-art-1]
  expected_behavior: answered
  expected_articles: ["1º"]

- id: const-cf-art2-poderes
  area: constitutional
  question: São Poderes da União independentes e harmônicos entre si o Legislativo o Executivo e o Judiciário?
  expected_chunk_ids: [cf88-1988-1988-art-2]
  expected_behavior: answered
  expected_articles: ["2º"]

- id: const-cf-art3-objetivos-fundamentais
  area: constitutional
  question: Constituem objetivos fundamentais da República construir uma sociedade livre justa e solidária e erradicar a pobreza?
  expected_chunk_ids: [cf88-1988-1988-art-3]
  expected_behavior: answered
  expected_articles: ["3º"]

- id: const-cf-art5-igualdade-inviolabilidade
  area: constitutional
  question: Todos são iguais perante a lei garantindo-se a inviolabilidade do direito à vida liberdade igualdade segurança e propriedade?
  expected_chunk_ids: [cf88-1988-1988-art-5]
  expected_behavior: answered
  expected_articles: ["5º"]

