# Golden dataset — Out-of-scope (refusal) for the multi-area corpus (§36, §2.2).
#
# These areas have NO statute ingested into the corpus (no Lei de Licitações, no
# legislação previdenciária/INSS, no Lei de Migração, no Lei Eleitoral). The classifier
# scope covers consumer/civil/criminal/labor/tax/constitutional only; everything here
# must resolve to status=refused so refusal_when_no_source_rate (>= 0.90) stays honestly
# measured as the corpus grows. No expected_chunk_ids (nothing legitimate to retrieve).
#
# Deliberately adversarial: several queries share surface tokens with in-scope codes
# (CF art. 37 "administração pública", CLT for "servidor") to confirm the writer refuses
# on insufficient grounding rather than answering from a tangentially-overlapping chunk.

- id: oosx-adm-licitacao-modalidades
  area: out_of_scope
  question: Quais são as modalidades de licitação previstas na Lei 14.133/2021 de Licitações e Contratos Administrativos?
  expected_chunk_ids: []
  expected_behavior: refused

- id: oosx-adm-servidor-estabilidade
  area: out_of_scope
  question: Quais os requisitos de estabilidade do servidor público estatutário após o estágio probatório na Lei 8.112/1990?
  expected_chunk_ids: []
  expected_behavior: refused

- id: oosx-adm-improbidade
  area: out_of_scope
  question: Quais os atos de improbidade administrativa que importam enriquecimento ilícito na Lei 8.429/1992?
  expected_chunk_ids: []
  expected_behavior: refused

- id: oosx-prev-aposentadoria-tempo
  area: out_of_scope
  question: Quais os requisitos para aposentadoria por tempo de contribuição junto ao INSS após a reforma da previdência?
  expected_chunk_ids: []
  expected_behavior: refused

- id: oosx-prev-incapacidade
  area: out_of_scope
  question: Quais perícias o INSS exige para conceder o benefício por incapacidade temporária ao segurado?
  expected_chunk_ids: []
  expected_behavior: refused

- id: oosx-ele-inelegibilidade
  area: out_of_scope
  question: Quais as hipóteses de inelegibilidade previstas na Lei Complementar 64 de 1990 ficha limpa?
  expected_chunk_ids: []
  expected_behavior: refused

- id: oosx-mig-visto-humanitario
  area: out_of_scope
  question: Quais os requisitos para obtenção de visto humanitário no Brasil pela Lei de Migração 13.445?
  expected_chunk_ids: []
  expected_behavior: refused

