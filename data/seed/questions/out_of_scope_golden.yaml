# Golden dataset — Out-of-scope (refusal) for the multi-area corpus (§36, §2.2).
#
# DETERMINISTIC refusal cohort. After the Phase-14 explicit OOS-signal wiring
# (_workspace/14_answer_oos_signal_consume_summary.md), the AnswerWriter pre-refuses,
# BEFORE retrieval and INDEPENDENT of the embedding provider, every question whose text
# matches a corpusless juridical regime via `matched_out_of_scope_regime(question)`
# (agentic, _workspace/14_agentic_oos_signal_summary.md). Only a question that classifies
# UNKNOWN AND matches NO regime ("no evidence") proceeds to retrieval, where grounding +
# the CitationAuditor decide.
#
# Therefore this golden holds exactly the questions that refuse DETERMINISTICALLY under
# both the fake and the real pipeline:
#   1. defined out-of-scope `administrative` area (licitação, concurso, improbidade,
#      servidor) — pre-refused by the scope gate; and
#   2. UNKNOWN-classified corpusless regimes whose text matches a term in the agentic
#      `_OUT_OF_SCOPE_TERMS` set (previdenciário/INSS/aposentadoria, ambiental/
#      licenciamento, propriedade industrial/INPI/marca/patente, marítimo, empresarial/
#      recuperação judicial/sociedade) — pre-refused by `matched_out_of_scope_regime`,
#      independent of the embedding (no lexical-luck involved).
#
# What is NOT here (kept in out_of_scope_eval_real_debt.yaml): questions that match NO
# regime term and therefore reach retrieval, refusing only on dense-embedding grounding
# distance. Under the fake purely-lexical store they leak. These are the genuine
# eval-real debt: corpusless TAX sub-topics of the in-scope `tax` area (alíquota IRPF,
# ITCMD, ICMS específico), plus regimes whose specific surface vocabulary is not yet a
# regime term (eleitoral/inelegibilidade, migração/visto, família/sucessões substantivas,
# concorrência/CADE, autoral, M&A, tese penal STF, registro civil). They depend on real
# dense grounding, not on a deterministic pre-refusal.
#
# Pendência ao orquestrador (agentic): broaden `_OUT_OF_SCOPE_TERMS` to cover the
# remaining corpusless regimes (eleitoral, migração, concorrência, autoral, sucessões
# substantivas) so they too pre-refuse deterministically and can return to this golden.

- id: oosx-adm-licitacao-modalidades
  area: out_of_scope
  question: Quais são as modalidades de licitação previstas na Lei 14.133/2021 de Licitações e Contratos Administrativos?
  expected_chunk_ids: []
  expected_behavior: refused

