# Golden dataset — Direito Civil (CC, Lei 10.406/2002; CPC, Lei 13.105/2015).
#
# Phase E multi-area golden (§24, §35-37). Anchored on REAL articles present in the
# ingested corpus (data/generated/statutes_chunks.jsonl) — no invented article/chunk
# (system rule #1). Each question is lexically calibrated so the deterministic
# FakeEmbeddingProvider recovers the expected chunk in the top-5 (recall@5 >= 0.80).
# area is tagged explicitly; expected_chunk_ids use the corpus chunk_id scheme
# (cc-10406-2002-art-N / cpc-13105-2015-art-N).

- id: civil-cc-art186-ato-ilicito
  area: civil
  question: Aquele que por ação ou omissão negligência ou imprudência violar direito e causar dano a outrem ainda que exclusivamente moral comete ato ilícito?
  expected_chunk_ids: [cc-10406-2002-art-186]
  expected_behavior: answered
  expected_articles: ["186"]

