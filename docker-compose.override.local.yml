# Local-providers overlay (Phase 12).
#
# Wires the API to local providers (sentence-transformers embeddings + Ollama LLM).
# Activate by composing both files explicitly:
#
#   docker compose -f docker-compose.yml -f docker-compose.override.local.yml up --build
#
# Ollama runs **on the macOS host** (not in a container) so it can use Metal/GPU.
# Docker Desktop on macOS exposes only CPU to containers, which makes 3B+ chat
# models exceed any reasonable request timeout. The API reaches the host daemon
# via the Docker-provided DNS alias `host.docker.internal` (mapped explicitly
# below for Linux parity).
#
# Prereq on the host: `brew install ollama && ollama serve`, then
# `ollama pull llama3.1:8b` (see `make pull-models`).

services:
  api:
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
