# Local-providers overlay (Phase 12).
#
# Adds an Ollama service and wires the API to it. Activate by composing both
# files explicitly:
#
#   docker compose -f docker-compose.yml -f docker-compose.override.local.yml up --build
#
# Provider selection is read from `.env` (EMBEDDING_PROVIDER, LLM_PROVIDER);
# set them to `local` / `ollama` respectively to engage the local path.

services:
  api:
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
    depends_on:
      - postgres
      - qdrant
      - redis
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
